<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Bin Maqsood {% block admin_title %}{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        .admin-sidebar a.active {
            background: #f1f5f9;
            color: #1e293b;
            border-left: 3px solid #9A7B56;
        }

        .admin-sidebar a {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .admin-sidebar a:hover {
            background: #f8fafc;
        }

        .admin-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .admin-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .admin-table tr:hover td {
            background: #fafafa;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #b45309;
        }

        .status-shipped {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-delivered {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>

<body>

    <div class="flex min-h-screen bg-gray-50 font-['Inter']">

        <!-- Sidebar -->
        <aside
            class="admin-sidebar w-64 bg-white border-r border-gray-200 min-h-screen p-4 flex-shrink-0 hidden md:block">
            <div class="mb-8 px-2">
                <span class="font-bold text-xl text-[#1C1B19]">BIN MAQSOOD</span>
                <p class="text-xs text-gray-400 mt-0.5">Admin Panel</p>
            </div>
            <nav class="space-y-1">
                <a href="/admin/dashboard"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-gray-600 hover:bg-gray-50 transition {% if request.path == '/admin/dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-pie w-5 text-center"></i> Dashboard
                </a>
                <a href="/admin/products"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-gray-600 hover:bg-gray-50 transition {% if request.path == '/admin/products' %}active{% endif %}">
                    <i class="fas fa-box w-5 text-center"></i> Products
                </a>
                <a href="/admin/orders"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-gray-600 hover:bg-gray-50 transition {% if request.path == '/admin/orders' %}active{% endif %}">
                    <i class="fas fa-truck w-5 text-center"></i> Orders
                </a>
                <a href="/"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition mt-4 border-t border-gray-100 pt-4">
                    <i class="fas fa-arrow-left w-5 text-center"></i> Back to Store
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-h-screen">
            <!-- Top Navbar -->
            <header
                class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                <h2 class="text-lg font-semibold text-[#1C1B19]">{% block admin_header %}Dashboard{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500">admin@binmaqsood.com</span>
                    <span
                        class="w-8 h-8 rounded-full bg-[#9A7B56] text-white flex items-center justify-center font-semibold text-sm">A</span>
                </div>
            </header>

            <!-- Page Content -->
            <main class="p-6 flex-1">
                {% block admin_content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block admin_scripts %}{% endblock %}

</body>

</html>
